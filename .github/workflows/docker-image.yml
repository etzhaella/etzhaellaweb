name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    if: ${{ secrets.DOCKER_USERNAME_ETZHAELLA != '' && secrets.DOCKER_PASSWORD_ETZHAELLA != '' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME_ETZHAELLA }}
        password: ${{ secrets.DOCKER_PASSWORD_ETZHAELLA }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME_ETZHAELLA }}/etzhaellaweb:latest
