name: Banner Generator CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-banner-generator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run banner generator
        run: python generate_banner_1.py

      - name: Verify output file exists
        run: test -f banner.png
